<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBR Theory Exam Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3352;
    --accent: #4f7cff;
    --accent-light: #e8eeff;
    --green: #22c55e;
    --green-bg: #052e16;
    --red: #ef4444;
    --red-bg: #2d0a0a;
    --amber: #f59e0b;
    --amber-bg: #2d1a00;
    --text: #e8eaf0;
    --muted: #7c82a0;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  .container { width: 100%; max-width: 680px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-flag {
    font-size: 26px;
    line-height: 1;
  }
  .logo-text {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .exam-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .format-note {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-n {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }
  .stat-l {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Progress bar */
  .pbar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .pfill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Category filter */
  .cats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .cbt {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cbt:hover { border-color: var(--accent); color: var(--accent); }
  .cbt.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  /* Question card */
  .qcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }
  .qmeta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .qtag {
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .qtag.k { background: #1a2744; color: #7ba3ff; border: 1px solid #2e3f6e; }
  .qtag.i { background: #1a2a1a; color: #5dbf5d; border: 1px solid #2e5a2e; }

  .qtxt {
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 20px;
    font-weight: 400;
  }

  .opts { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s;
    width: 100%;
    line-height: 1.5;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: #141829;
  }
  .opt.correct {
    background: var(--green-bg);
    border-color: var(--green);
    color: #86efac;
  }
  .opt.wrong {
    background: var(--red-bg);
    border-color: var(--red);
    color: #fca5a5;
  }
  .opt.reveal {
    background: var(--green-bg);
    border-color: var(--green);
    color: #86efac;
    opacity: 0.45;
  }
  .opt:disabled { cursor: default; }
  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    min-width: 20px;
    padding-top: 1px;
    opacity: 0.6;
  }

  /* Explanation */
  .expl {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--surface2);
    border-radius: var(--radius);
    border-left: 3px solid var(--accent);
    font-size: 13px;
    color: #a8b0cc;
    line-height: 1.65;
  }
  .expl.on { display: block; }
  .expl strong { color: var(--text); font-weight: 500; }

  /* Actions */
  .acts {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: #3d6aee; }

  /* Result screen */
  .result {
    display: none;
    text-align: center;
    padding: 40px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .result-score {
    font-size: 64px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-score.pass { color: var(--green); }
  .result-score.fail { color: var(--red); }
  .result-label { font-size: 18px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .result-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .result-tip {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.6;
    text-align: left;
    margin-bottom: 24px;
  }
  .result-tip.warn { background: var(--amber-bg); color: #fcd34d; border: 1px solid #78350f; }
  .result-tip.good { background: var(--green-bg); color: #86efac; border: 1px solid #14532d; }
  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* Responsive */
  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-n { font-size: 18px; }
    .qtxt { font-size: 15px; }
    .result-score { font-size: 48px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">
      <span class="logo-flag">🇳🇱</span>
      <span class="logo-text">CBR Exam Trainer</span>
    </div>
    <span class="exam-badge">Exam: 2 Jul 2026</span>
  </div>
  <div class="format-note">New format (April 2025): 50 questions · need 44/50 to pass · 30 minutes</div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sd">0</div><div class="stat-l">Answered</div></div>
    <div class="stat"><div class="stat-n" id="sc">0</div><div class="stat-l">Correct</div></div>
    <div class="stat"><div class="stat-n" id="sw">0</div><div class="stat-l">Wrong</div></div>
    <div class="stat"><div class="stat-n" id="sp">—</div><div class="stat-l">Score</div></div>
  </div>

  <div class="pbar"><div class="pfill" id="pf"></div></div>

  <div class="cats" id="cbar"></div>

  <div id="qa">
    <div class="qcard">
      <div class="qmeta" id="qm"></div>
      <div class="qtxt" id="qt"></div>
      <div class="opts" id="op"></div>
      <div class="expl" id="ex"></div>
      <div class="acts" id="ac"></div>
    </div>
  </div>

  <div class="result" id="rs">
    <div class="result-score" id="rsc"></div>
    <div class="result-label" id="rl"></div>
    <div class="result-sub" id="rp"></div>
    <div class="result-tip" id="rt" style="display:none"></div>
    <div class="result-tip good" id="rb" style="display:none"></div>
    <div class="result-btns">
      <button class="btn primary" onclick="restart()">Try again</button>
      <button class="btn" onclick="window.open('https://cbr.nl','_blank')">Book on cbr.nl ↗</button>
    </div>
  </div>

</div>

<script>
var Q=[
{c:"Priority",t:"K",q:"You are at an unmarked intersection. A vehicle comes from your right. What must you do?",o:["Accelerate to clear the junction first","Give way to the vehicle on your right","Sound your horn to warn the driver","The vehicle on the left must yield"],a:1,e:"<strong>Right before left (rechts voor links)</strong> is the Dutch default rule at all unmarked intersections. You must always yield to traffic approaching from your right."},
{c:"Priority",t:"K",q:"You are driving on a road marked with a yellow diamond sign. A car wants to enter from a side road. Who has priority?",o:["The car on the side road","You — you are on a priority road","The first to arrive","You must yield in built-up areas"],a:1,e:"A <strong>yellow diamond (voorrangsweg)</strong> means you are on a priority road. All vehicles joining from side roads must give way to you until you see an end-of-priority sign."},
{c:"Priority",t:"I",q:"A bus at a stop indicates to pull out into traffic in a built-up area. What should you do?",o:["Quickly overtake before it moves","Give way to the bus","Sound your horn","The bus must wait for all traffic to pass"],a:1,e:"In built-up areas, <strong>buses leaving bus stops have legal priority</strong> once they indicate. You must give way if it is safe to do so."},
{c:"Priority",t:"I",q:"You approach a roundabout. The road has shark-teeth markings (haaientanden) at the entry. Who has priority?",o:["You, as you are entering","Traffic already circulating on the roundabout","The vehicle on your right","Whichever vehicle is larger"],a:1,e:"<strong>Shark-teeth markings (haaientanden)</strong> at roundabout entries mean you must yield. Traffic already on the roundabout always has priority."},
{c:"Priority",t:"I",q:"You want to turn left. A cyclist is riding straight ahead in a cycle lane crossing your path. Who has priority?",o:["You, because you are turning left","The cyclist going straight ahead","Whoever reached the junction first","The motorist always has priority"],a:1,e:"When turning left or right, you must always <strong>yield to cyclists going straight ahead</strong> in a cycle lane crossing your path."},
{c:"Priority",t:"I",q:"You are driving and a pedestrian is standing at a zebra crossing, clearly waiting to cross. What must you do?",o:["Continue — they are not yet on the road","Give way and stop before the crossing","Sound your horn to alert them","Slow down but you are not required to stop"],a:1,e:"Pedestrians <strong>waiting at a zebra crossing have priority</strong>. You must stop and give way before they step onto the crossing."},
{c:"Priority",t:"I",q:"You are turning right at an intersection. Pedestrians are crossing the road you are turning into. Who has right of way?",o:["You, as you are already in the turn","The pedestrians crossing","Whoever was there first","Pedestrians only have priority on zebra crossings"],a:1,e:"When turning, you must <strong>yield to pedestrians crossing</strong> the road you are turning into — regardless of whether a zebra crossing is present."},
{c:"Speed limits",t:"K",q:"What is the default speed limit inside a built-up area (bebouwde kom) when no sign is posted?",o:["30 km/h","50 km/h","60 km/h","70 km/h"],a:1,e:"The default limit within a <strong>built-up area is 50 km/h</strong>. A lower limit (e.g. 30 km/h zone) only applies if signed."},
{c:"Speed limits",t:"K",q:"What is the default speed limit on a Dutch motorway (snelweg)?",o:["100 km/h","120 km/h","130 km/h","110 km/h"],a:2,e:"The default maximum is <strong>130 km/h</strong>. However, many motorways are restricted to 100 km/h between 06:00–19:00 for environmental reasons. Always follow dynamic overhead signs."},
{c:"Speed limits",t:"K",q:"What is the default speed limit outside a built-up area on a normal road (not a motorway)?",o:["60 km/h","80 km/h","100 km/h","120 km/h"],a:1,e:"The default outside built-up areas on normal roads is <strong>80 km/h</strong> for cars. The autoweg (expressway) limit is 100 km/h."},
{c:"Speed limits",t:"K",q:"You enter a 30 km/h zone. Where does the limit end?",o:["After 300 metres","At the next main road","At the end-of-zone sign (30 with a line through it)","At the next traffic light"],a:2,e:"A <strong>zone sign covers the entire zone</strong> until you see the matching end-of-zone sign — the same number with a diagonal line through it."},
{c:"Speed limits",t:"I",q:"You are towing a caravan on a motorway. What is your maximum speed?",o:["130 km/h","120 km/h","100 km/h","90 km/h"],a:3,e:"When towing a trailer or caravan on a motorway, the <strong>maximum speed is 90 km/h</strong>."},
{c:"Traffic signs",t:"K",q:"A blue circular sign with a white upward arrow. What does it mean?",o:["Recommended direction","No entry for oncoming traffic","You must go straight ahead — mandatory","One-way street starts here"],a:2,e:"<strong>Blue circles with white symbols are mandatory</strong> instruction signs. An upward white arrow means you must continue straight ahead."},
{c:"Traffic signs",t:"K",q:"A red-bordered triangle with a black exclamation mark. What does it mean?",o:["Stop — give way","General hazard — proceed with care","Road closed ahead","Speed restriction ahead"],a:1,e:"A <strong>red-bordered triangle with an exclamation mark</strong> is a general hazard warning. Slow down and be prepared for any danger."},
{c:"Traffic signs",t:"K",q:"What does an inverted triangle (pointing downward) with a red border mean?",o:["Stop completely","Give way to all traffic on the road you are entering","No entry","You have priority"],a:1,e:"The <strong>inverted triangle is the give-way sign</strong>. You must yield to all traffic on the road you are entering."},
{c:"Traffic signs",t:"K",q:"A round red sign with a white horizontal bar. What does it mean?",o:["Speed limit zone","No entry for all vehicles","Parking prohibited","No overtaking"],a:1,e:"A <strong>round red sign with a white horizontal bar means no entry</strong> for all vehicles — typically placed on one-way streets or exit ramps."},
{c:"Traffic signs",t:"K",q:"You see the word 'Erf' on a sign. What rules apply inside?",o:["Speed limit of 30 km/h applies","Pedestrians have priority everywhere — max speed is walking pace","Cycling is prohibited","Parking is free and unrestricted"],a:1,e:"An <strong>erf (home zone)</strong> is a residential area where pedestrians and cyclists have priority everywhere. Max speed is walking pace (~15 km/h). Park only in marked spaces."},
{c:"Traffic signs",t:"K",q:"What does a blue rectangular sign with a white 'P' mean?",o:["Paid parking only","Parking is permitted here","Private parking — no access","Disabled badge holders only"],a:1,e:"A <strong>white P on blue means parking is permitted</strong> at that location. Sub-plates (onderborden) may specify time limits or payment requirements."},
{c:"Alcohol & drugs",t:"K",q:"What is the legal blood alcohol limit (BAC) for an experienced driver (licence 5+ years)?",o:["0.0 mg/ml","0.2 mg/ml","0.5 mg/ml","0.8 mg/ml"],a:2,e:"The legal limit for experienced drivers is <strong>0.5 mg/ml blood alcohol</strong>. For novice drivers — fewer than 5 years — zero tolerance (0.0) applies."},
{c:"Alcohol & drugs",t:"K",q:"Your prescription medication says 'may impair driving'. What should you do?",o:["Drive only short distances","Take a lower dose","Do not drive until confirmed safe by a doctor or pharmacist","Drive slowly and avoid motorways"],a:2,e:"If your medication carries a driving warning, <strong>get medical advice before driving</strong>. Driving under impairing medication is a criminal offence regardless of prescription."},
{c:"Overtaking",t:"K",q:"On a Dutch motorway, when is it permitted to overtake on the right?",o:["When left-lane traffic is going slower","Never — overtaking on the right is always forbidden under normal conditions","When the left lane is occupied by a turning vehicle","Only in a lane marked for overtaking"],a:1,e:"In the Netherlands, <strong>overtaking on the right is prohibited</strong> under normal conditions. You must always overtake on the left."},
{c:"Overtaking",t:"I",q:"Before starting to overtake on a two-lane road, what must you ensure?",o:["Only that you have checked your mirrors","That you can complete the entire manoeuvre safely without forcing others to adjust","That the vehicle ahead is going below the speed limit","That there are no cyclists on the road"],a:1,e:"You may only begin an overtake when the road ahead is <strong>clearly visible and free</strong>, and you can return to your lane safely without forcing other drivers to react."},
{c:"Overtaking",t:"K",q:"Minimum lateral distance when overtaking a cyclist at speeds above 50 km/h?",o:["0.5 metres","1 metre","1.5 metres","2 metres"],a:2,e:"Dutch law requires at least <strong>1 metre up to 50 km/h, and at least 1.5 metres above 50 km/h</strong> when passing cyclists."},
{c:"Motorway",t:"K",q:"You join a motorway via an on-ramp. Who has priority?",o:["You, accelerating on the on-ramp","Traffic already on the motorway","The vehicle arriving at the merge first","Heavier vehicles always"],a:1,e:"<strong>Traffic already on the motorway has priority.</strong> Use the acceleration lane to match speed and merge when there is a safe gap."},
{c:"Motorway",t:"I",q:"Your tyre blows out at 120 km/h on the motorway. What is the correct action?",o:["Brake hard and steer to the hard shoulder","Hold the wheel firmly, ease off the throttle gradually, steer calmly to the hard shoulder","Immediately turn on hazard lights and stop in your lane","Signal right and brake firmly"],a:1,e:"Hold the wheel firmly, <strong>do not brake hard</strong> (it can cause a spin), ease off gradually, and steer calmly to the hard shoulder. Only brake gently once on the shoulder."},
{c:"Motorway",t:"K",q:"Your car breaks down on the motorway. You reach the hard shoulder. What must you do?",o:["Stay in the car with hazard lights on","Get out, place warning triangle 30m+ behind car, hazard lights on, wait behind crash barrier","Call the police from inside the car","Put on a high-vis vest and stand next to the car"],a:1,e:"<strong>Hazard lights on, triangle at least 30 m behind, stand behind the crash barrier</strong> — never beside the car. Call for assistance from behind the barrier."},
{c:"Motorway",t:"I",q:"What does the zipper merge rule (ritsen) require when a lane narrows?",o:["The merging lane must give way early","Both lanes use the full road to the merge point; vehicles alternate one-by-one","Left lane always has priority","Stop and let all merging vehicles pass"],a:1,e:"The <strong>zipper rule (rits)</strong>: both lanes continue to the actual merge point, then vehicles alternate one from each lane. Moving over early reduces traffic flow."},
{c:"Motorway",t:"K",q:"Recommended following distance on the motorway at 120 km/h in dry conditions?",o:["2 seconds","3 seconds (approximately 100 metres)","50 metres","1 second"],a:1,e:"At 120 km/h, keep at least <strong>3 seconds — roughly 100 metres</strong> — behind the vehicle ahead. In rain or poor visibility, double this."},
{c:"Lights",t:"K",q:"When must you switch to dipped headlights (dimlichten) during the day?",o:["Only in tunnels","In reduced visibility: rain, fog, snow, or twilight","Only at night on unlit roads","Only on motorways in bad weather"],a:1,e:"<strong>Dipped headlights are required whenever visibility is reduced</strong> — fog, heavy rain, snow, dusk, dawn, or tunnels. DRLs are not a substitute."},
{c:"Lights",t:"K",q:"Under what condition may you use rear fog lights (achtermistlichten)?",o:["Whenever it is raining","Only when visibility is less than 50 metres","Whenever it is dark outside","When you feel it adds safety"],a:1,e:"Rear fog lights may only be used when <strong>visibility is less than 50 metres</strong>. Using them otherwise is an offence as they dazzle following drivers."},
{c:"Lights",t:"K",q:"You park at night on an unlit road. The car has no parking light. What must you do?",o:["Park close to the kerb without any lights","Leave sidelights (position lights) on, or park under a street lamp","Leave hazard lights flashing","Leave dipped headlights on"],a:1,e:"On an unlit road at night, your parked vehicle must be visible. <strong>Use sidelights or park under street lighting.</strong> Hazard lights are not a substitute."},
{c:"Vehicle & docs",t:"K",q:"What is an APK?",o:["A driving licence category","The mandatory periodic vehicle roadworthiness inspection","A toll payment system","A form of car insurance"],a:1,e:"<strong>APK (Algemene Periodieke Keuring)</strong> is the mandatory periodic vehicle inspection — similar to the UK MOT. Driving without a valid APK is illegal."},
{c:"Vehicle & docs",t:"K",q:"Your vehicle's tyre tread depth is below the legal limit. What must you do?",o:["Drive carefully in dry conditions","Replace the tyres before driving on public roads","Reduce your speed by 20 km/h","You can drive if it isn't raining"],a:1,e:"The legal minimum tread depth is <strong>1.6 mm</strong>. Driving with tyres below this limit is illegal regardless of weather conditions."},
{c:"Parking",t:"K",q:"A yellow zigzag line is painted on the road. What does it mean?",o:["No overtaking here","No stopping or parking at any time","Short-term parking permitted","Pedestrian crossing ahead"],a:1,e:"<strong>Yellow zigzag lines mean no stopping or parking at any time</strong> — commonly found near schools, bus stops, and junctions."},
{c:"Parking",t:"I",q:"You want to stop briefly to drop off a passenger near zigzag lines. Is this permitted?",o:["Yes, briefly dropping off a passenger is always allowed","No — stopping is prohibited on or near zigzag lines for any reason","Yes, as long as you stay in the car","Yes, if no bus is at the stop"],a:1,e:"Yellow zigzag lines <strong>prohibit both stopping and parking</strong> — including brief drop-offs. There are no exceptions."},
{c:"Cyclists & pedestrians",t:"I",q:"You are driving behind a bus that stops. It indicates to pull out. What should you do?",o:["Overtake on the left immediately","Give way — the bus has priority in built-up areas","Sound your horn to make it wait","Pass on the right if there is space"],a:1,e:"In built-up areas, <strong>buses leaving stops have priority once they signal</strong>. Give way and only proceed when safe."},
{c:"Cyclists & pedestrians",t:"I",q:"A child on a bicycle wobbles and swerves in front of you. What should you have done?",o:["Driven closer to the centre line to pass quickly","Left a larger safety margin when passing the cyclist","Sounded the horn to warn the child earlier","Flashed your headlights"],a:1,e:"Cyclists — especially children — can swerve unpredictably. Always <strong>leave generous space and reduce speed</strong> when passing. 1.5 m is a minimum."},
{c:"Insight",t:"I",q:"You approach a junction where a parked van blocks your view to the right. What should you do?",o:["Accelerate to pass the blind spot quickly","Slow right down and edge forward carefully until you can see","Sound your horn and proceed","The vehicle on your left must yield, so continue"],a:1,e:"<strong>Reduced visibility at junctions is a common hazard.</strong> Slow right down, edge forward gradually, and do not commit until you can see clearly."},
{c:"Insight",t:"I",q:"It is raining heavily. The car in front is spraying a large water mist. What is safest?",o:["Maintain current following distance","Increase following distance significantly and reduce speed","Overtake to get away from the spray","Switch on hazard lights and brake firmly"],a:1,e:"Wet roads greatly increase stopping distances. <strong>Double your following distance and reduce speed</strong> in heavy rain."},

var cat="All",fq=[],sq=[],cur=0,score=0,total=0,done=false;
var cats=["All","Priority","Speed limits","Traffic signs","Alcohol & drugs","Overtaking","Motorway","Lights","Vehicle & docs","Parking","Cyclists & pedestrians","Insight","Emergency","Environment"];

function shufl(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function buildCats(){
  var bar=document.getElementById("cbar");
  bar.innerHTML="";
  cats.forEach(function(c){
    var has=c==="All"||Q.some(function(x){return x.c===c;});
    if(!has)return;
    var btn=document.createElement("button");
    btn.className="cbt"+(c===cat?" on":"");
    btn.textContent=c;
    btn.onclick=function(){cat=c;restart();};
    bar.appendChild(btn);
  });
}

function init(){
  fq=cat==="All"?Q.slice():Q.filter(function(x){return x.c===cat;});
  sq=shufl(fq);cur=0;score=0;total=0;done=false;
  document.getElementById("rs").style.display="none";
  document.getElementById("qa").style.display="block";
  upd();render();
}

function render(){
  if(cur>=sq.length){showRes();return;}
  done=false;
  var q=sq[cur];
  var qm=document.getElementById("qm");
  qm.innerHTML="<span>Q "+(cur+1)+"/"+sq.length+"</span> <span>·</span> <span>"+q.c+"</span> <span>·</span> <span class='qtag "+(q.t==="K"?"k":"i")+"'>"+(q.t==="K"?"Knowledge":"Insight")+"</span>";
  document.getElementById("qt").textContent=q.q;
  var op=document.getElementById("op");
  op.innerHTML="";
  var L=["A","B","C","D"];
  for(var i=0;i<q.o.length;i++){
    (function(idx){
      var b=document.createElement("button");
      b.className="opt";
      b.innerHTML="<span class='opt-letter'>"+L[idx]+"</span><span>"+q.o[idx]+"</span>";
      b.onclick=function(){check(idx,q.a,q.e);};
      op.appendChild(b);
    })(i);
  }
  document.getElementById("ex").className="expl";
  document.getElementById("ex").innerHTML="";
  document.getElementById("ac").innerHTML="";
  document.getElementById("pf").style.width=Math.round(cur/sq.length*100)+"%";
}

function check(ch,ans,exp){
  if(done)return;done=true;total++;
  var bs=document.getElementById("op").querySelectorAll(".opt");
  bs.forEach(function(b,i){
    b.disabled=true;
    if(i===ans&&i===ch)b.className="opt correct";
    else if(i===ch)b.className="opt wrong";
    else if(i===ans)b.className="opt reveal";
  });
  if(ch===ans)score++;
  upd();
  var ex=document.getElementById("ex");
  ex.innerHTML=(ch===ans?"<strong style='color:#22c55e'>Correct.</strong> ":"<strong style='color:#ef4444'>Incorrect.</strong> ")+exp;
  ex.className="expl on";
  var ac=document.getElementById("ac");
  var nb=document.createElement("button");
  nb.className="btn primary";
  nb.textContent=cur+1<sq.length?"Next question →":"See results";
  nb.onclick=function(){cur++;render();};
  ac.appendChild(nb);
}

function upd(){
  document.getElementById("sd").textContent=total;
  document.getElementById("sc").textContent=score;
  document.getElementById("sw").textContent=total-score;
  document.getElementById("sp").textContent=total>0?Math.round(score/total*100)+"%":"—";
}

function showRes(){
  document.getElementById("qa").style.display="none";
  var rs=document.getElementById("rs");
  rs.style.display="block";
  var pct=Math.round(score/sq.length*100);
  var isAll=cat==="All";
  var passed=isAll?(score>=44):(pct>=88);
  var rsc=document.getElementById("rsc");
  rsc.textContent=score+" / "+sq.length;
  rsc.className="result-score "+(passed?"pass":"fail");
  document.getElementById("rl").textContent=passed?"You passed!":"Not there yet — keep practising.";
  document.getElementById("rp").textContent=isAll?"Real exam: need 44/50. You got "+score+".":pct+"% on '"+cat+"' questions.";
  var rt=document.getElementById("rt");
  var rb=document.getElementById("rb");
  if(!passed){
    rt.style.display="block";
    rt.className="result-tip warn";
    rt.textContent="Tip: use the category buttons to drill your weakest topics. Focus on Insight questions — they make up about 2/3 of the real exam.";
    rb.style.display="none";
  } else {
    rt.style.display="none";
    rb.style.display="block";
    rb.textContent="On track for the real exam! Book at cbr.nl — English version costs €57. Remember to select English when booking.";
  }
  document.getElementById("pf").style.width="100%";
}

function restart(){buildCats();init();}

buildCats();init();
</script>
